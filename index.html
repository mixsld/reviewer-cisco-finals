            { text: "A router has used the OSPF protocol to learn a route to the 172.16.32.0/19 network. Which command will implement a backup floating static route to this network?", options: ["ip route 172.16.0.0 255.255.224.0 S0/0/0 100", "ip route 172.16.0.0 255.255.240.0 S0/0/0 200", "ip route 172.16.32.0 255.255.224.0 S0/0/0 200", "ip route 172.16.32.0 255.255.0.0 S0/0/0 100"], correct: [2], explanation: "Topic 15.4.1\nOSPF has an administrative distance of 110, so the floating static route must have an administrative distance higher than 110. Because the target network is 172.16.32.0/19, that static route must use the network 172.16.32.0 and a netmask of 255.255.224.0." },
            { text: "Consider the following command:\nip route 192.168.10.0 255.255.255.0 10.10.10.2 5\nHow would an administrator test this configuration?", options: ["Delete the default gateway route on the router.", "Manually shut down the router interface used as a primary route.", "Ping from the 192.168.10.0 network to the 10.10.10.2 address.", "Ping any valid address on the 192.168.10.0/24 network."], correct: [1], explanation: "Topic 15.4.3\nA floating static is a backup route that only appears in the routing table when the interface used with the primary route is down. To test a floating static route, the route must be in the routing table. Therefore, shutting down the interface used as a primary route would allow the floating static route to appear in the routing table." },
            { text: "Refer to the exhibit. Which type of IPv6 static route is configured in the exhibit?", options: ["floating static route", "fully specified static route", "recursive static route", "directly attached static route"], correct: [2], explanation: "Topic 15.1.4\nThe route provided points to another address that must be looked up in the routing table. This makes the route a recursive static route." },
            { text: "What characteristic completes the following statement?\nWhen an IPv6 static route is configured, it is first necessary to configure ......", options: ["the next-hop address of two different adjacent routers.", "the \"ipv6 unicast-routing\" command.", "an IPv6 link-local address on the adjacent router.", "an administrative distance of 2."], correct: [1], explanation: "Topic 15.1.4\nBefore configuring IPv6 routing, you must enable IPv6 routing globally with the 'ipv6 unicast-routing' command." },
            { text: "Gateway of last resort is not set. [...] \nRefer to the exhibit. Which interface will be the exit interface to forward a data packet that has the destination IP address 192.168.12.227?", options: ["Drop the packet.", "Send the packet out the GigabitEthernet0/0 interface.", "Send the packet out the Serial0/0/0 interface.", "Send the packet out the GigabitEthernet0/1 interface."], correct: [2], explanation: "Topic 14.4.9\nAfter a router determines the destination network by ANDing the destination IP address with the subnet mask, the router examines the routing table. When no routing table entry is found, the default gateway or gateway of last resort is used. The router proceeds to transmit the packet out the Serial0/0/0 interface." },
            { text: "Consider the following command:\nip route 192.168.10.0 255.255.255.0 10.10.10.2 5\nWhich route would have to go down in order for this static route to appear in the routing table?", options: ["a default route", "a static route to the 192.168.10.0/24 network", "an OSPF-learned route to the 192.168.10.0/24 network", "an EIGRP-learned route to the 192.168.10.0/24 network"], correct: [1], explanation: "Topic 15.4.1\nThe administrative distance of 5 added to the end of the static route creates a floating static situation for a static route that goes down. By default, a static route to the 192.168.10.0/24 network has an administrative distance of 1. Therefore, the floating route with an administrative distance of 5 will not be placed into the routing table unless the previously entered static route to the 192.168.10.0/24 goes down or was never entered." },
            { text: "What are two advantages of static routing over dynamic routing? (Choose two.)", options: ["Static routing is more secure because it does not advertise over the network.", "Static routing scales well with expanding networks.", "Static routing requires very little knowledge of the network for correct implementation.", "Static routing uses fewer router resources than dynamic routing.", "Static routing is relatively easy to configure for large networks."], correct: [0, 3], explanation: "Topic 14.5.1\nStatic routing uses fewer router resources, because no computing is required for updating routes. Static routing can also be more secure because it does not advertise over the network." },
            { text: "What characteristic completes the following statement?\nWhen an IPv6 static route is configured, it is possible that the same IPv6 link-local address is used for ...", options: ["a destination host route with a /128 prefix.", "the “ipv6 unicast-routing” command.", "the next-hop address of two different adjacent routers.", "an administrative distance of 2."], correct: [2], explanation: "Topic 15.2.6\nLink-local addresses are unique only on a single link, meaning the same IPv6 link-local address could potentially be used for the next-hop address of two different adjacent routers on different links." },
            { text: "A network administrator configures the interface fa0/0 on the router R1 with the command ip address 172.16.1.254 255.255.255.0. However, when the administrator issues the command show ip route, the routing table does not show the directly connected network. What is the possible cause of the problem?", options: ["The subnet mask is incorrect for the IPv4 address.", "The configuration needs to be saved first.", "The interface fa0/0 has not been activated.", "No packets with a destination network of 172.16.1.0 have been sent to R1."], correct: [2], explanation: "Topic 14.4.4\nA directly connected network will be added to the routing table when these three conditions are met: (1) the interface is configured with a valid IP address; (2) it is activated with no shutdown command; and (3) it receives a carrier signal from another device that is connected to the interface." },
            { text: "Refer to the exhibit. What command would be used to configure a static route on R1 so that traffic from both LANs can reach the 2001:db8:1:4::/64 remote network?", options: ["ipv6 route 2001:db8:1:4::/64 2001:db8:1:3::1", "ipv6 route 2001:db8:1::/65 2001:db8:1:3::1", "ipv6 route ::/0 serial0/0/0", "ipv6 route 2001:db8:1:4::/64 2001:db8:1:3::2"], correct: [3], explanation: "Topic 15.2.2\nTo configure an IPv6 static route, use the ipv6 route command followed by the destination network. Then add either the IP address of the adjacent router or the interface R1 will use to transmit a packet to the 2001:db8:1:4::/64 network." },
            { text: "Refer to the exhibit. What two commands will change the next-hop address for the 10.0.0.0/8 network from 172.16.40.2 to 192.168.1.2? (Choose two.)", options: ["A(config)# ip route 10.0.0.0 255.0.0.0 192.168.1.2", "A(config)# ip route 10.0.0.0 255.0.0.0 s0/0/0", "A(config)# no ip address 10.0.0.1 255.0.0.0 172.16.40.2", "A(config)# no network 10.0.0.0 255.0.0.0 172.16.40.2", "A(config)# no ip route 10.0.0.0 255.0.0.0 172.16.40.2"], correct: [0, 4], explanation: "Topic 15.1.3\nThe two required commands are A(config)# no ip route 10.0.0.0 255.0.0.0 172.16.40.2 (to remove the old route) and A(config)# ip route 10.0.0.0 255.0.0.0 192.168.1.2 (to add the new one)." },
            { text: "Refer to the exhibit. Which interface will be the exit interface to forward a data packet that has the destination IP address 192.168.139.244?", options: ["GigabitEthernet0/1", "None, the packet will be dropped.", "Serial0/0/1", "GigabitEthernet0/0"], correct: [0], explanation: "Topic 14.1.3\nIt matches the connected network 192.168.139.224/27 mapped to GigabitEthernet0/1." },
            { text: "What characteristic completes the following statement?\nWhen an IPv6 static route is configured, a fully-specified configuration should be used with ...", options: ["::/0.", "the \"ipv6 unicast-routing\" command.", "the next-hop address of two different adjacent routers.", "a directly connected multiaccess network."], correct: [3], explanation: "Topic 15.2.6\nWhen configuring a static route over a multiaccess network (like Ethernet), a fully specified static route (including both interface and next-hop IP) prevents recursive lookups and ensures correct ARP resolution." },
            { text: "Refer to the exhibit. Which interface will be the exit interface to forward a data packet that has the destination IP address 192.168.71.52?", options: ["The packet will take the gateway of last resort.", "GigabitEthernet0/1", "Serial0/0/0", "None, the packet will be dropped."], correct: [2], explanation: "Topic 14.1.3\nThe packet destination 192.168.71.52 matches the static route 192.168.71.0/26 which points via Serial0/0/0." },
            { text: "What characteristic completes the following statement?\nWhen an IPv6 static route is configured, the installation of the route can be verified with ......", options: ["a destination host route with a /128 prefix.", "the interface type and interface number.", "the \"show ipv6 route static\" command.", "an administrative distance of 2."], correct: [2], explanation: "Topic 15.2.7\nThe command \"show ipv6 route static\" allows you to view only the static IPv6 routes in the routing table." },
            { text: "Refer to the exhibit. Which interface will be the exit interface to forward a data packet that has the destination IP address 10.55.99.78?", options: ["None, the packet will be dropped.", "GigabitEthernet0/0", "GigabitEthernet0/1", "Serial0/0/1"], correct: [3], explanation: "Topic 14.1.3\nThe packet matches the 10.55.99.64/26 network which exits via Serial0/0/1." },
            { text: "Match the characteristic to the corresponding type of routing: typically used on stub networks.", options: ["static routing", "dynamic routing"], correct: [0], explanation: "Topic 14.5.1\nStatic routing is typically used on stub networks because there is only one path in and out." },
            { text: "Match the characteristic to the corresponding type of routing: less routing overhead.", options: ["static routing", "dynamic routing"], correct: [0], explanation: "Topic 14.5.1\nStatic routing consumes fewer resources because no computing or bandwidth is required for updating routes." },
            { text: "Match the characteristic to the corresponding type of routing: new networks are added automatically to the routing table.", options: ["static routing", "dynamic routing"], correct: [1], explanation: "Topic 14.5.1\nDynamic routing protocols automatically discover new networks and add them to the routing table." },
            { text: "Match the characteristic to the corresponding type of routing: best choice for large networks.", options: ["static routing", "dynamic routing"], correct: [1], explanation: "Topic 14.5.1\nDynamic routing scales much better for large networks than manually entering static routes." },
            { text: "Refer to the exhibit. Which interface will be the exit interface to forward a data packet that has the destination IP address 172.25.128.244?", options: ["GigabitEthernet0/0", "GigabitEthernet0/1", "None, the packet will be dropped.", "Serial0/0/1"], correct: [1], explanation: "Topic 14.1.3\nThe destination matches 172.25.128.224/27 mapped to GigabitEthernet0/1." },
            { text: "Ipv6 route 2001:0DB8::/32 2001:0DB8:3000::1\nWhich static route is configured here?", options: ["Floating static", "Recursive static", "Directly attached static", "Fully specified static"], correct: [1], explanation: "Topic 15.1.2\nThe Router has to look up in the routing table twice to find the exit interface. First, it identifies 2001:0DB8:3000::1 as the next hop. Then, it does a 2nd lookup in the table to find out what interface that address is associated with, making the first route a recursive route." }
        ];

        function App() {
            // Quiz Flow States
            const [started, setStarted] = React.useState(false);
            const [currentIndex, setCurrentIndex] = React.useState(0);
            const [selected, setSelected] = React.useState([]);
            const [hasSubmitted, setHasSubmitted] = React.useState(false);
            const [score, setScore] = React.useState(0);
            const [quizFinished, setQuizFinished] = React.useState(false);

            const currentQ = rawData[currentIndex];
            const isMultiple = currentQ && currentQ.correct.length > 1;

            const handleSelect = (optionIndex) => {
                if (hasSubmitted) return;
                
                setSelected(prev => {
                    if (isMultiple) {
                        return prev.includes(optionIndex)
                            ? prev.filter(i => i !== optionIndex)
                            : [...prev, optionIndex];
                    } else {
                        return [optionIndex];
                    }
                });
            };

            const handleSubmit = () => {
                const isCorrect = 
                    selected.length === currentQ.correct.length && 
                    selected.every(v => currentQ.correct.includes(v));

                if (isCorrect) setScore(s => s + 1);
                setHasSubmitted(true);
            };

            const handleNext = () => {
                if (currentIndex < rawData.length - 1) {
                    setCurrentIndex(prev => prev + 1);
                    setSelected([]);
                    setHasSubmitted(false);
                } else {
                    setQuizFinished(true);
                }
            };

            const handleRetake = () => {
                setStarted(false);
                setCurrentIndex(0);
                setSelected([]);
                setHasSubmitted(false);
                setScore(0);
                setQuizFinished(false);
            };

            if (!started) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 fade-in">
                        <div className="bg-white rounded-2xl shadow-xl max-w-2xl w-full p-8 md:p-12 text-center">
                            <div className="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                <svg className="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                            </div>
                            <h1 className="text-4xl font-extrabold text-gray-800 mb-4">CCNA 2 v7 Reviewer</h1>
                            <p className="text-lg text-gray-600 mb-8">Modules 10-13 (L2 Security & WLANs)<br/>Modules 14-16 (Routing Concepts)</p>
                            <p className="text-md text-gray-500 mb-8 border-l-4 border-indigo-400 pl-4 text-left inline-block">
                                Practice mode: Answer each question to immediately see if you are correct. The detailed explanation will appear to help you master the material!
                            </p>
                            <br/>
                            <button 
                                onClick={() => setStarted(true)}
                                className="px-8 py-4 bg-indigo-600 text-white text-xl font-bold rounded-xl shadow-lg hover:bg-indigo-700 hover:shadow-xl transition transform hover:-translate-y-1 w-full sm:w-auto"
                            >
                                Start Quiz ({rawData.length} Questions)
                            </button>
                        </div>
                    </div>
                );
            }

            if (quizFinished) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 fade-in">
                        <div className="bg-white rounded-2xl shadow-xl max-w-xl w-full p-10 text-center">
                            <h2 className="text-4xl font-bold text-gray-800 mb-6">Quiz Completed!</h2>
                            <div className="text-6xl font-black text-indigo-600 mb-4">
                                {score} <span className="text-3xl text-gray-400 font-medium">/ {rawData.length}</span>
                            </div>
                            <p className="text-xl text-gray-600 mb-8">
                                Accuracy: {Math.round((score / rawData.length) * 100)}%
                            </p>
                            <button 
                                onClick={handleRetake}
                                className="px-8 py-4 bg-indigo-600 text-white font-bold rounded-xl shadow-md hover:bg-indigo-700 transition w-full sm:w-auto"
                            >
                                Retake Quiz
                            </button>
                        </div>
                    </div>
                );
            }

            // During Quiz
            const isCorrectAnswer = hasSubmitted && selected.length === currentQ.correct.length && selected.every(v => currentQ.correct.includes(v));

            return (
                <div className="min-h-screen pb-16 pt-8 px-4 sm:px-8">
                    <div className="max-w-3xl mx-auto">
                        
                        {/* Progress Bar */}
                        <div className="mb-8">
                            <div className="flex justify-between text-sm text-gray-500 font-bold mb-2 uppercase tracking-wide">
                                <span>Question {currentIndex + 1} of {rawData.length}</span>
                                <span>Score: {score}</span>
                            </div>
                            <div className="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                                <div 
                                    className="bg-indigo-600 h-2.5 rounded-full transition-all duration-500 ease-out"
                                    style={{ width: `${((currentIndex + 1) / rawData.length) * 100}%` }}
                                ></div>
                            </div>
                        </div>

                        {/* Question Card */}
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-6 fade-in">
                            <div className="p-6 md:p-8">
                                <h3 className="text-xl md:text-2xl font-semibold text-gray-800 leading-snug whitespace-pre-line mb-8">
                                    {currentQ.text}
                                </h3>

                                <div className="space-y-3">
                                    {currentQ.options.map((opt, idx) => {
                                        const isSelected = selected.includes(idx);
                                        const isActualCorrect = currentQ.correct.includes(idx);
                                        
                                        let btnClass = "w-full text-left px-5 py-4 rounded-xl border-2 transition-all flex items-start gap-4 text-base md:text-lg ";
                                        
                                        if (hasSubmitted) {
                                            if (isActualCorrect && isSelected) {
                                                btnClass += "bg-green-50 border-green-500 text-green-900 shadow-sm";
                                            } else if (isActualCorrect && !isSelected) {
                                                btnClass += "bg-green-50 border-green-500 text-green-900 border-dashed opacity-80";
                                            } else if (!isActualCorrect && isSelected) {
                                                btnClass += "bg-red-50 border-red-500 text-red-900 shadow-sm";
                                            } else {
                                                btnClass += "bg-gray-50 border-gray-200 text-gray-400 opacity-60";
                                            }
                                        } else {
                                            btnClass += isSelected ? "bg-indigo-50 border-indigo-500 text-indigo-900 shadow-sm" : "bg-white border-gray-200 text-gray-700 hover:border-indigo-300 hover:bg-gray-50";
                                        }

                                        return (
                                            <button 
                                                key={idx}
                                                onClick={() => handleSelect(idx)}
                                                className={btnClass}
                                                disabled={hasSubmitted}
                                            >
                                                <div className={`mt-0.5 w-6 h-6 flex-shrink-0 flex items-center justify-center border-2 ${isMultiple ? 'rounded' : 'rounded-full'} 
                                                    ${hasSubmitted 
                                                        ? (isActualCorrect ? 'border-green-500 bg-green-500' : (isSelected ? 'border-red-500 bg-red-500' : 'border-gray-300 bg-white'))
                                                        : (isSelected ? 'border-indigo-500 bg-indigo-500' : 'border-gray-300 bg-white')
                                                    }`}
                                                >
                                                    {hasSubmitted && isActualCorrect && <svg className="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>}
                                                    {hasSubmitted && !isActualCorrect && isSelected && <svg className="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M6 18L18 6M6 6l12 12" /></svg>}
                                                    {!hasSubmitted && isSelected && (isMultiple ? <svg className="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg> : <div className="w-2.5 h-2.5 bg-white rounded-full"></div>)}
                                                </div>
                                                <span className="whitespace-pre-line leading-snug">{opt}</span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        {/* Controls & Feedback */}
                        {!hasSubmitted ? (
                            <button 
                                onClick={handleSubmit}
                                disabled={selected.length === 0}
                                className={`w-full py-4 text-lg font-bold rounded-xl shadow-md transition ${selected.length > 0 ? 'bg-indigo-600 text-white hover:bg-indigo-700' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}
                            >
                                Submit Answer
                            </button>
                        ) : (
                            <div className="slide-up">
                                {/* Explanation Box */}
                                <div className={`mb-6 p-6 rounded-2xl border-l-8 shadow-sm ${isCorrectAnswer ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'}`}>
                                    <h4 className={`text-2xl font-black mb-4 flex items-center gap-2 ${isCorrectAnswer ? 'text-green-700' : 'text-red-700'}`}>
                                        {isCorrectAnswer ? (
                                            <><svg className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"/></svg> Correct!</>
                                        ) : (
                                            <><svg className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> Incorrect</>
                                        )}
                                    </h4>
                                    
                                    <div className="bg-white p-5 rounded-xl border border-gray-100 shadow-sm">
                                        <h5 className="font-bold text-gray-800 mb-2 uppercase tracking-wide text-sm flex items-center gap-2">
                                            <svg className="w-4 h-4 text-indigo-500" fill="currentColor" viewBox="0 0 20 20"><path d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clipRule="evenodd" fillRule="evenodd"></path></svg>
                                            Explanation
                                        </h5>
                                        <p className="text-gray-700 leading-relaxed whitespace-pre-line">
                                            {currentQ.explanation}
                                        </p>
                                    </div>
                                </div>

                                <button 
                                    onClick={handleNext}
                                    className="w-full py-4 bg-gray-800 text-white text-lg font-bold rounded-xl shadow-md hover:bg-gray-900 transition"
                                >
                                    {currentIndex < rawData.length - 1 ? 'Next Question ➔' : 'View Results'}
                                </button>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
